<!DOCTYPE html>
<html lang="en">
<title>Chart Test</title>
<head>
<link REL="SHORTCUT ICON" href="static/favicon.ico" type="image/x-icon">
<link rel="icon" href="static/favicon.ico" type="image/x-icon">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script rel="javascript" src="./static/js/jquery-3.6.4.min.js"></script>

<style>
 body {
background-color: rgb(8, 8, 33);
 }
/* Style the links inside the pill navigation menu */
.pill-nav p {
  display: inline-block;
  background-color: rgb(185, 234, 252);
  color: black;
  text-align: center;
  padding: .8em;
  text-decoration: none;
  font-size: 1em;
  border-radius: 5px;
}

/* Change the color of links on mouse-over */
.pill-nav p:hover {
  background-color: #ffffff;
  color: black;
  font-weight: 200;
}

/* Add a color to the active/current link */
.pill-nav p.active {
  background-color: dodgerblue;
  color: white;
} 
</style>
</head>


    <!-- HTML -->

    <div class="pill-nav">
        <p id="nsidc_button" onclick="button_switcher('nsidc')" class="active" href="#news">NSIDC 25km</p>
        <p id="amsr_button" onclick="button_switcher('amsr2')" href="#contact">AMSR2 3.125km</p>+
      </div> 


      <script>
        const button_switcher = (value) => {
            if (value === 'amsr2') {
                $("#amsr_button").addClass("active");
                $("#nsidc_button").removeClass("active");
            } else if (value === 'nsidc') {
                $("#nsidc_button").addClass("active");
                $("#amsr_button").removeClass("active");
            }
        }

      </script>



</html>
